name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: |
          set +e
          gradle assembleDebug --no-daemon > full-log.txt 2>&1
          BUILD_EXIT=$?

          echo ""
          echo "########## BUILD EXIT CODE: $BUILD_EXIT ##########"
          echo ""

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "########## FAILED TASKS ##########"
            grep -E "^> Task.*FAILED" full-log.txt || echo "(no FAILED task line)"

            echo ""
            echo "########## ERROR LINES ##########"
            grep -iE "error:|error!|ERROR:" full-log.txt | head -n 50 || echo "(no error lines)"

            echo ""
            echo "########## What went wrong section ##########"
            sed -n '/^\* What went wrong:/,/^\* Try:/p' full-log.txt || echo "(no section)"

            echo ""
            echo "########## FAILURE section ##########"
            grep -A 5 "^FAILURE:" full-log.txt || echo "(no FAILURE line)"
          fi

          exit $BUILD_EXIT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ScheduledLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload full log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: full-log.txt
