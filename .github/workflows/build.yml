name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          SDK_ROOT="$HOME/android-sdk"

          mkdir -p "$SDK_ROOT/cmdline-tools"
          cd "$SDK_ROOT/cmdline-tools"
          wget -q "$SDK_URL" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV

          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: gradle assembleDebug --info --no-daemon 2>&1 | tee build.log
        continue-on-error: true

      - name: Show last 100 lines of build log
        if: always()
        run: |
          echo "=========== LAST 100 LINES OF BUILD LOG ==========="
          tail -n 100 build.log || echo "No build.log found"
          echo "=========== END OF LOG ==========="

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ScheduledLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
